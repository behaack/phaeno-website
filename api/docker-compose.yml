services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__phaeno-website: ${WEBSITE_DATABASE_CONNECTION_STRING:?WEBSITE_DATABASE_CONNECTION_STRING is required}
      GoogleAuthSettings__RecaptchaSecretKey: ${RECAPTCHA_SECRET}
      GoogleAuthSettings__RecaptchaServiceAccountKeyPath: ${RECAPTCHA_SERVICE_ACCOUNT_KEY_PATH:-/app/__DOCUMENTS/private/secrets/recaptcha-enterprise-service-account.json}
      EmailServiceSettings__ApiKey: ${MAILGUN_API_KEY}
    volumes:
      - ./documents:/app/__DOCUMENTS

  filebrowser:
    image: filebrowser/filebrowser:v2
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./documents/public:/srv
      - filebrowser_data:/database
    command:
      - --database
      - /database/filebrowser.db
      - --root
      - /srv
      - --baseurl
      - /manage-pseq-assets-7f3c9
      - --address
      - 0.0.0.0

  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles:
      - caddy
    environment:
      SITE_HOST: ${SITE_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  filebrowser_data:
  caddy_data:
  caddy_config:
