<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>body{margin:0;background:#FAF8F2} a{color:inherit;text-decoration:none} input,textarea{font-family:'IBM Plex Sans',sans-serif}</style>
</helmet>

<dc-import name="Header" current-page="Contact" hint-size="100%,72px"></dc-import>

<main style="font-family:'IBM Plex Sans',sans-serif;color:#16211D">
  <section style="max-width:1100px;margin:0 auto;padding:76px 48px 80px;display:flex;gap:56px;flex-wrap:wrap">

    <div style="flex:1 1 380px;min-width:300px;display:flex;flex-direction:column;gap:16px">
      <span style="align-self:flex-start;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#12433C;background:#E4EEE9;border:1px solid rgba(27,110,99,.25);padding:7px 14px;border-radius:999px">Contact</span>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;line-height:1.15;margin:14px 0 0">Talk to the PSeq team</h1>
      <p style="font-size:16.5px;line-height:1.65;color:#4B5750;margin:0">Whether you're evaluating PSeq for your lab, exploring a multi-omics integration, or just have a question &mdash; we'll get back to you quickly.</p>

      <div style="margin-top:20px;display:flex;flex-direction:column;gap:14px">
        <div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#7C8A80">Email</div>
          <a href="mailto:info@phaenobiotech.com" style="font-size:15.5px;color:#1B6E63;font-weight:600">info@phaenobiotech.com</a>
        </div>
        <div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#7C8A80">Address</div>
          <p style="margin:2px 0 0;font-size:15.5px;color:#16211D;line-height:1.5">Phaeno Inc.<br>5270 California Avenue, Suite 300<br>Irvine, CA 92617</p>
        </div>
      </div>
    </div>

    <form style="flex:1 1 420px;min-width:320px;background:#fff;border:1px solid rgba(22,33,29,.12);border-radius:20px;padding:36px;display:flex;flex-direction:column;gap:18px" onSubmit="{{ handleSubmit }}">
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:13px;font-weight:600;color:#16211D">Name</label>
        <input type="text" required="{{ true }}" style="border:1px solid rgba(22,33,29,.18);border-radius:10px;padding:12px 14px;font-size:14.5px;background:#FAF8F2" />
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:13px;font-weight:600;color:#16211D">Work email</label>
        <input type="email" required="{{ true }}" style="border:1px solid rgba(22,33,29,.18);border-radius:10px;padding:12px 14px;font-size:14.5px;background:#FAF8F2" />
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:13px;font-weight:600;color:#16211D">Organization</label>
        <input type="text" style="border:1px solid rgba(22,33,29,.18);border-radius:10px;padding:12px 14px;font-size:14.5px;background:#FAF8F2" />
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:13px;font-weight:600;color:#16211D">I'm interested in</label>
        <select style="border:1px solid rgba(22,33,29,.18);border-radius:10px;padding:12px 14px;font-size:14.5px;background:#FAF8F2">
          <option>Requesting a demo</option>
          <option>Evaluating PSeq for my lab</option>
          <option>Multi-omics integration</option>
          <option>Investor inquiry</option>
          <option>Other</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:13px;font-weight:600;color:#16211D">Message</label>
        <textarea rows="4" style="border:1px solid rgba(22,33,29,.18);border-radius:10px;padding:12px 14px;font-size:14.5px;background:#FAF8F2;resize:vertical"></textarea>
      </div>
      <button type="submit" style="background:#DB6B3B;color:#fff;font-weight:600;font-size:15.5px;padding:14px;border:none;border-radius:999px;cursor:pointer;margin-top:6px" style-hover="background:#B8532A">{{ submitLabel }}</button>
    </form>

  </section>
</main>

<dc-import name="Footer" hint-size="100%,320px"></dc-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { submitted: false };
  renderVals() {
    return {
      submitLabel: this.state.submitted ? 'Thanks \u2014 we\u2019ll be in touch' : 'Send message',
      handleSubmit: (e) => {
        e.preventDefault();
        this.setState({ submitted: true });
      },
    };
  }
}

</script>
</body>
</html>
