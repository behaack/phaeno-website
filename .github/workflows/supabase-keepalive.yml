name: Supabase keepalive

on:
  schedule:
    - cron: "37 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

env:
  DATABASE_PING_URL: https://webops.phaenobiotech.com/api/v1/web-ops/database-ping

jobs:
  ping-database:
    name: Ping database
    runs-on: ubuntu-latest

    steps:
      - name: Ping database endpoint
        run: |
          for attempt in {1..3}; do
            if curl -fsS --max-time 20 "$DATABASE_PING_URL" > /dev/null; then
              exit 0
            fi

            echo "Database ping failed on attempt $attempt; retrying in 10 seconds."
            sleep 10
          done

          curl -fsS --max-time 20 "$DATABASE_PING_URL" > /dev/null
